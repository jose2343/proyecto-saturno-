<!DOCTYPE html>
<html>
<head>
    <title>Registrar vehículo</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>

    <h1>Registrar vehículo</h1>

    <div class="contenedor">

        <p>Completa la información de tu vehículo</p>
        <hr>

        <div class="fila">
            <div class="grupo">
                <label>Marca *</label>
                <select>
                    <option>Selecciona una marca</option>
                    <option>Toyota</option>
                    <option>Chevrolet</option>
                    <option>Mazda</option>
                </select>
            </div>

            <div class="grupo">
                <label>Modelo *</label>
                <input type="text" placeholder="Ej: Corolla">
            </div>
        </div>

        <div class="fila">
            <div class="grupo">
                <label>Año *</label>
                <input type="number" placeholder="2020">
            </div>

            <div class="grupo">
                <label>Placa *</label>
                <input type="text" placeholder="ABC123">
            </div>
        </div>

        <div class="fila">
            <div class="grupo">
                <label>Color *</label>
                <input type="text" placeholder="Blanco">
            </div>

            <div class="grupo">
                <label>Kilometraje *</label>
                <input type="number" placeholder="50000">
            </div>
        </div>

        <div class="grupo">
            <label>VIN (Opcional)</label>
            <input type="text" placeholder="1HGBH41JXMN109186">
            <small>Número de identificación del vehículo – 17 caracteres</small>
        </div>

        <hr>

        <div class="botones">
            <button class="guardar">Guardar vehículo</button>
            <button class="limpiar">Limpiar</button>
        </div>

    </div>

</body>
</html>
